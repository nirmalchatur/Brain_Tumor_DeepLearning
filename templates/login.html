<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Brain Tumor Detection System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: #f8fafc;
            background-image: linear-gradient(160deg, #f8fafc 0%, #f1f5f9 40%, #eff6ff 100%);
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Very soft ambient depth — barely visible */
        body::before {
            content: '';
            position: fixed;
            top: -15%;
            right: -8%;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.045) 0%, transparent 65%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -15%;
            left: -8%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.03) 0%, transparent 65%);
            pointer-events: none;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            animation: cardIn 0.4s ease-out;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ---------- Card ---------- */
        .card {
            position: relative;
            background: #fff;
            border-radius: 14px;
            border: 1px solid #e8ecf1;
            box-shadow:
                0 1px 2px rgba(0, 0, 0, 0.04),
                0 4px 20px rgba(0, 0, 0, 0.06);
            padding: 2.5rem 2.25rem 2rem;
        }

        /* Thin accent bar — subtle, not flashy */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #2563eb, #0891b2);
            border-radius: 14px 14px 0 0;
        }

        /* ---------- Brand ---------- */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-icon {
            width: 52px;
            height: 52px;
            background: #eff6ff;
            border: 1px solid #dbeafe;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
        }

        .brand-icon svg {
            width: 26px;
            height: 26px;
            color: #2563eb;
        }

        .brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.025em;
            margin-bottom: 0.35rem;
        }

        .brand p {
            font-size: 0.8125rem;
            color: #64748b;
            line-height: 1.5;
        }

        /* ---------- Form ---------- */
        .form-group {
            margin-bottom: 1.125rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.4rem;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .field-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            width: 17px;
            height: 17px;
            color: #a1aab5;
            pointer-events: none;
            transition: color 0.15s ease;
        }

        .input-wrap input {
            width: 100%;
            padding: 0.625rem 0.75rem 0.625rem 2.375rem;
            border: 1px solid #dde3ea;
            border-radius: 9px;
            font-size: 0.875rem;
            font-family: inherit;
            color: #0f172a;
            background: #fff;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .input-wrap input::placeholder {
            color: #a1aab5;
        }

        .input-wrap input:hover {
            border-color: #c8cfd8;
        }

        /* Filled-but-not-focused state */
        .input-wrap input:not(:placeholder-shown) {
            border-color: #c8cfd8;
        }

        .input-wrap input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .input-wrap input:focus ~ .field-icon {
            color: #2563eb;
        }

        /* Password field needs right padding for the toggle */
        .input-wrap input.has-toggle {
            padding-right: 2.5rem;
        }

        /* ---------- Password toggle ---------- */
        .toggle-pw {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            padding: 0.25rem;
            cursor: pointer;
            color: #a1aab5;
            border-radius: 5px;
            transition: color 0.15s ease;
            line-height: 0;
        }

        .toggle-pw:hover {
            color: #64748b;
        }

        .toggle-pw:focus-visible {
            outline: 2px solid #2563eb;
            outline-offset: 1px;
        }

        .toggle-pw svg {
            width: 17px;
            height: 17px;
            display: block;
        }

        /* ---------- Options row ---------- */
        .options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0.125rem 0 1.5rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            cursor: pointer;
        }

        .remember input[type="checkbox"] {
            width: 15px;
            height: 15px;
            accent-color: #2563eb;
            cursor: pointer;
            margin: 0;
        }

        .remember span {
            font-size: 0.8125rem;
            color: #64748b;
            user-select: none;
        }

        .forgot {
            font-size: 0.8125rem;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot:hover {
            text-decoration: underline;
        }

        .forgot:focus-visible {
            outline: 2px solid #2563eb;
            outline-offset: 2px;
            border-radius: 3px;
        }

        /* ---------- Submit ---------- */
        .btn-submit {
            width: 100%;
            padding: 0.6875rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 9px;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s ease, box-shadow 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 42px;
        }

        .btn-submit:hover {
            background: #1d4ed8;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }

        .btn-submit:active {
            background: #1e40af;
            box-shadow: none;
        }

        .btn-submit:focus-visible {
            outline: 2px solid #2563eb;
            outline-offset: 2px;
        }

        .btn-submit:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-submit .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.5s linear infinite;
            display: none;
        }

        .btn-submit.loading .spinner { display: block; }
        .btn-submit.loading .btn-text { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ---------- Bottom links ---------- */
        .request-access {
            text-align: center;
            margin-top: 1.375rem;
            padding-top: 1.25rem;
            border-top: 1px solid #f1f5f9;
        }

        .request-access p {
            font-size: 0.8125rem;
            color: #64748b;
        }

        .request-access a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .request-access a:hover {
            text-decoration: underline;
        }

        .request-access a:focus-visible {
            outline: 2px solid #2563eb;
            outline-offset: 2px;
            border-radius: 3px;
        }

        /* ---------- Security note ---------- */
        .security-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            margin-top: 1.125rem;
            font-size: 0.6875rem;
            color: #a1aab5;
        }

        .security-note svg {
            width: 12px;
            height: 12px;
            flex-shrink: 0;
        }

        /* ---------- Error alert ---------- */
        .alert {
            padding: 0.625rem 0.75rem;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 9px;
            margin-bottom: 1.125rem;
            font-size: 0.8125rem;
            color: #991b1b;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            line-height: 1.45;
            animation: alertIn 0.2s ease;
        }

        .alert svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
            margin-top: 1px;
            color: #dc2626;
        }

        @keyframes alertIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ---------- Footer outside card ---------- */
        .page-footer {
            margin-top: 1.75rem;
            text-align: center;
            font-size: 0.6875rem;
            color: #c1c9d4;
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 480px) {
            body { padding: 1rem; }
            .card { padding: 2rem 1.5rem 1.625rem; }
            .brand h1 { font-size: 1.125rem; }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="card">
            <div class="brand">
                <div class="brand-icon" aria-hidden="true">
                    <!-- Simple brain / scan icon -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a8.5 8.5 0 0 0-8.5 8.5c0 2.6 1.1 4.8 2.7 6.3-.4.6-.7 1.4-.7 2.2 0 1.9 1.6 3.5 3.5 3.5.6 0 1.1-.1 1.5-.4.5-.2 1-.4 1.5-.4s1 .2 1.5.4c.4.3.9.4 1.5.4 1.9 0 3.5-1.6 3.5-3.5 0-.8-.3-1.6-.7-2.2 1.6-1.5 2.7-3.7 2.7-6.3A8.5 8.5 0 0 0 12 2z"/>
                        <path d="M12 2v20"/>
                        <path d="M8 8.5c1.3-.4 2.7-.4 4 0s2.7.4 4 0"/>
                        <path d="M8 13.5c1.3-.4 2.7-.4 4 0s2.7.4 4 0"/>
                    </svg>
                </div>
                <h1>Brain Tumor Detection</h1>
                <p>Sign in with your staff credentials</p>
            </div>

            <form id="loginForm" method="POST" action="/login" novalidate>
                <div id="errorContainer"></div>

                <div class="form-group">
                    <label for="username">Staff ID</label>
                    <div class="input-wrap">
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="e.g. STF-0042"
                            required
                            autocomplete="username"
                        >
                        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Access Code</label>
                    <div class="input-wrap">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="has-toggle"
                            placeholder="Enter your access code"
                            required
                            autocomplete="current-password"
                        >
                        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">
                            <svg id="iconEyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                            <svg id="iconEyeOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="options">
                    <label class="remember">
                        <input type="checkbox" name="remember" id="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="/forgot-password" class="forgot">Forgot code?</a>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="btn-text">Sign in</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="request-access">
                <p>Don't have access? <a href="/register">Request credentials</a></p>
            </div>

            <div class="security-note">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                <span>Encrypted connection &middot; Secure access only</span>
            </div>
        </div>

        <div class="page-footer">&copy; 2025 Brain Tumor Detection System</div>
    </div>

    <script>
        const togglePw    = document.getElementById('togglePw');
        const pwInput     = document.getElementById('password');
        const iconEyeOff  = document.getElementById('iconEyeOff');
        const iconEyeOn   = document.getElementById('iconEyeOn');
        const form        = document.getElementById('loginForm');
        const submitBtn   = document.getElementById('submitBtn');
        const errorBox    = document.getElementById('errorContainer');

        // Password visibility toggle
        togglePw.addEventListener('click', () => {
            const showing = pwInput.type === 'text';
            pwInput.type = showing ? 'password' : 'text';
            iconEyeOff.style.display = showing ? 'block' : 'none';
            iconEyeOn.style.display  = showing ? 'none'  : 'block';
            togglePw.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
        });

        // Show server-side error from URL
        const params = new URLSearchParams(window.location.search);
        const serverError = params.get('error');
        if (serverError) showError(decodeURIComponent(serverError));

        // Form submit
        form.addEventListener('submit', (e) => {
            errorBox.innerHTML = '';

            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            if (!user || !pass) {
                e.preventDefault();
                showError('Please fill in all fields.');
                return;
            }

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            // Form submits naturally to /login
        });

        function showError(msg) {
            errorBox.innerHTML = `
                <div class="alert" role="alert">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span>${msg}</span>
                </div>`;
        }
    </script>
</body>
</html>
